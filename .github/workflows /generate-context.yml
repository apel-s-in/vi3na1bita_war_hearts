name: Generate .meta games context

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '.meta/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: games-context-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Game Center context
        run: |
          node generate-context.js --mode=both --max-lines=20000
          ls -la .meta || true

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "CI: generate games .meta context"
          branch: ${{ github.ref_name }}
          file_pattern: ".meta/project-games-*.txt"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
