name: Validate War Hearts

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate ESM syntax
        run: |
          while IFS= read -r file; do
            echo "CHECK $file"
            node --input-type=module --check < "$file"
          done < <(find src -type f -name '*.js' | sort)

      - name: Validate sandbox storage boundary
        run: |
          if grep -REn "localStorage|sessionStorage|indexedDB" src; then
            echo "Persistent browser storage found inside War Hearts"
            exit 2
          fi

      - name: Validate parent-mediated transport
        run: |
          if grep -REn "X-Vi3-Session|X-Yandex-OAuth|clientSecret|FriendsCore" src; then
            echo "Private parent authentication or direct FriendsCore access found"
            exit 2
          fi

          grep -q "GC_SAVE_DATA" src/game/match-persistence.js
          grep -q "GC_SAVE_DATA" src/screens/field.js

          grep -q "ranked_match_prepare" ../vi3na1bita-games/common/network-bridge.js 2>/dev/null || true
          grep -q "prepareRankedMatch" src/game/ranked-v2.js
          grep -q "transcriptHash" src/game/ranked-v2.js
          grep -q "recordRankedShot" src/game/network-combat.js

          if grep -REn "createTranscript|TURN_STATE" src; then
            echo "Legacy or dead transcript code found"
            exit 2
          fi
