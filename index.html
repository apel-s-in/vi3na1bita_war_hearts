<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#07091a">
  <title>Война Сердец</title>
  <meta name="description" content="P2P-дуэль Война Сердец в Game Center Витрина Разбита">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-screen="menu">
  <main class="wh-app" id="app">
    <section class="wh-phone" aria-label="Война Сердец">
      <header class="wh-topbar">
        <button class="wh-icon-btn" type="button" id="back-btn" aria-label="Закрыть">✕</button>
        <div class="wh-title">
          <h1>Война Сердец</h1>
          <p id="screen-subtitle">Дуэль 10×10</p>
        </div>
        <div class="wh-status" id="net-status">Гость</div>
      </header>

      <section class="wh-content" id="screen-root"></section>

      <nav class="wh-bottom">
        <button class="wh-tab is-active" type="button" data-action="menu">Меню</button>
        <button class="wh-tab" type="button" data-action="opponents">Соперник</button>
        <button class="wh-tab" type="button" data-action="battle">Бой</button>
      </nav>

      <div class="wh-toast" id="toast" hidden></div>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
